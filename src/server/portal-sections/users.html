<section class="view active" data-view-panel="users">
  <div class="workspace-shell">
    <div class="workspace-commandbar" aria-label="User administration controls">
      <div class="commandbar-title">
        <strong>Users & Roles</strong>
        <span>System admin access control</span>
      </div>
      <button class="button ghost" type="button" id="reloadUsersButton">Reload</button>
    </div>

    <div class="workspace-body">
      <section class="workspace-grid" aria-label="Portal users">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>User</th>
                <th>Status</th>
                <th>Roles</th>
                <th>Last Login</th>
              </tr>
            </thead>
            <tbody id="userRows">
              <tr><td colspan="4">Loading users...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <aside class="workspace-inspector" aria-label="Selected user role assignment">
        <div class="inspector-header">
          <h2 id="userDetailTitle">Role Assignment</h2>
          <span id="userDetailStatus">Select a user</span>
        </div>
        <div class="identity-list" id="userIdentity"></div>
        <div class="record-tabs" aria-label="User administration areas">
          <span>Identity</span>
          <span>Roles</span>
          <span>Catalog</span>
        </div>
        <div class="role-editor" id="roleEditor"></div>
        <label class="stack-field" for="roleChangeReason">
          <span>Audit Reason</span>
          <textarea id="roleChangeReason" rows="3" placeholder="Reason for this access change"></textarea>
        </label>
        <div class="action-row">
          <button class="button primary" type="button" id="saveRolesButton">Save Roles</button>
        </div>

        <div class="inspector-divider"></div>
        <div class="inspector-header compact">
          <h2>Role Catalog</h2>
          <span>Seeded permissions</span>
        </div>
        <div class="role-catalog" id="roleCatalog"></div>
      </aside>
    </div>

    <div class="workspace-statusbar">
      <span>Only system administrators can access this page.</span>
      <span>Role changes write audit entries.</span>
    </div>
  </div>
</section>
