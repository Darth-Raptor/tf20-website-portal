<section class="view active" data-view-panel="personnel">
  <div class="workspace-shell">
    <div class="workspace-commandbar personnel-commandbar" aria-label="Personnel roster controls">
      <div class="commandbar-title">
        <strong>Personnel Roster</strong>
        <span>TF20 database source of truth</span>
      </div>
      <input id="personnelSearch" type="search" placeholder="Search rank, alias, MOS, billet, unit..." aria-label="Search personnel" />
      <select id="personnelSort" aria-label="Sort personnel">
        <option value="alias">Alphabetically</option>
        <option value="rank">By rank</option>
        <option value="billet">By billet</option>
        <option value="unit">By unit</option>
        <option value="mos">By MOS</option>
      </select>
      <select id="personnelStatusFilter" aria-label="Status filter">
        <option value="all">All statuses</option>
        <option value="Active">Active</option>
        <option value="Recruit">Recruit</option>
        <option value="ProbationaryMember">Probationary Member</option>
        <option value="LeaveOfAbsence">Leave of Absence</option>
        <option value="Reserve">Reserve</option>
        <option value="Inactive">Inactive</option>
        <option value="Discharged">Discharged</option>
        <option value="BannedDoNotRehire">Banned</option>
      </select>
    </div>

    <div class="workspace-body">
      <section class="workspace-grid" aria-label="Personnel roster">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Alias</th>
                <th>Primary Unit</th>
                <th>Primary MOS</th>
                <th>Primary Billet</th>
                <th>Status</th>
                <th>Flags</th>
              </tr>
            </thead>
            <tbody id="personnelRows"></tbody>
          </table>
        </div>
      </section>

      <aside class="workspace-inspector" aria-label="Selected personnel profile">
        <div class="inspector-header">
          <h2>Selected Profile</h2>
          <span id="personnelDetailStatus">No selection</span>
        </div>
        <div class="record-tabs" aria-label="Personnel record areas">
          <span>Overview</span>
          <span>Assignments</span>
          <span>Audit</span>
        </div>
        <div id="personnelDetail" class="detail-panel"></div>
        <div class="action-row">
          <button class="button" type="button" id="flagTrainingButton">Flag Training</button>
          <button class="button primary" type="button" id="recommendPromotionButton">Recommend Promotion</button>
        </div>

        <div class="inspector-divider"></div>
        <div class="inspector-header compact">
          <h2>Staff Update</h2>
          <span>Audit required</span>
        </div>
        <form class="stack-form" id="personnelUpdateForm">
          <label>
            Primary Unit
            <select id="personnelEditUnit"></select>
          </label>
          <label>
            Primary Billet
            <select id="personnelEditBillet"></select>
          </label>
          <label>
            Primary MOS
            <select id="personnelEditMos" name="primaryMos"></select>
          </label>
          <label>
            Current Status
            <select id="personnelEditStatus">
              <option value="Recruit">Recruit</option>
              <option value="ProbationaryMember">Probationary Member</option>
              <option value="Active">Active</option>
              <option value="Reserve">Reserve</option>
              <option value="LeaveOfAbsence">Leave of Absence</option>
              <option value="Inactive">Inactive</option>
              <option value="Discharged">Discharged</option>
              <option value="BannedDoNotRehire">Banned</option>
            </select>
          </label>
          <label class="checkbox-field">
            <input id="personnelEditGoodStanding" type="checkbox" />
            <span>In good standing</span>
          </label>
          <label>
            Staff Sections
            <div class="checkbox-list" id="personnelEditSections"></div>
          </label>
          <label>
            Audit Reason
            <textarea id="personnelEditReason" rows="3" placeholder="Why is this personnel update being made?"></textarea>
          </label>
          <p class="form-feedback" id="personnelUpdateFeedback" role="status" aria-live="polite"></p>
          <div class="action-row">
            <button class="button primary" type="submit" id="savePersonnelUpdateButton">Save Personnel Update</button>
          </div>
        </form>
      </aside>
    </div>

    <div class="workspace-statusbar">
      <span>Personnel scope is enforced server-side.</span>
      <span>Profile changes require an audit reason.</span>
    </div>
  </div>
</section>
