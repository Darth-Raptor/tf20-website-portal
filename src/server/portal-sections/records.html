<section class="view active" data-view-panel="records">
  <div class="workspace-shell">
    <div class="workspace-commandbar" aria-label="Records controls">
      <div class="commandbar-title">
        <strong>Lifecycle Ledger</strong>
        <span>Discord and personnel record history</span>
      </div>
      <input id="recordsSearch" type="search" placeholder="Search alias, classification, Discord, notes..." aria-label="Search records" />
      <select id="recordsStatusFilter" aria-label="Records classification filter">
        <option value="all">All records</option>
        <option value="Joined">Joined</option>
        <option value="Applied">Applied</option>
        <option value="Enlisted">Enlisted</option>
        <option value="Discharged">Discharged</option>
        <option value="Left">Left</option>
      </select>
    </div>

    <div class="workspace-body">
      <section class="workspace-grid" aria-label="Lifecycle records">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ALIAS</th>
                <th>CLASSIFICATION</th>
                <th>JOIN DATE</th>
                <th>LEAVE DATE</th>
              </tr>
            </thead>
            <tbody id="recordsRows"></tbody>
          </table>
        </div>
      </section>

      <aside class="workspace-inspector" aria-label="Selected lifecycle record">
        <div class="inspector-header">
          <h2>Selected Record</h2>
          <span id="recordDetailStatus">No selection</span>
        </div>
        <div class="record-tabs" aria-label="Record sections">
          <span>Identity</span>
          <span>Lifecycle</span>
          <span>History</span>
        </div>
        <div id="recordDetail" class="detail-panel"></div>
      </aside>
    </div>

    <div class="workspace-statusbar">
      <span>Records are command/system restricted.</span>
      <span>Leave date remains blank until separation.</span>
    </div>
  </div>
</section>
