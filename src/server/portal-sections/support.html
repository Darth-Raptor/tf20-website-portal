<section class="view active" data-view-panel="support">
          <div class="section-grid">
            <section class="panel">
              <div class="panel-heading">
                <h2>Submit Support Ticket</h2>
                <span>Member self-service</span>
              </div>
              <form class="stack-form" id="supportForm">
                <label>
                  Title
                  <input id="supportTitle" name="title" type="text" maxlength="160" placeholder="Short issue title" />
                </label>
                <label>
                  Category
                  <select id="supportCategory" name="category">
                    <option value="Website">Website</option>
                    <option value="Portal">Portal</option>
                    <option value="Profile Change Request">Profile Change Request</option>
                    <option value="Discord">Discord</option>
                    <option value="Modpack">Modpack</option>
                    <option value="Game Server">Game Server</option>
                    <option value="Other">Other</option>
                  </select>
                </label>
                <label>
                  Severity
                  <select id="supportSeverity" name="severity">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>
                  </select>
                </label>
                <label>
                  Summary
                  <textarea id="supportSummary" name="summary" rows="3" placeholder="What is going wrong?"></textarea>
                </label>
                <label>
                  Details
                  <textarea id="supportDescription" name="description" rows="4" placeholder="Steps to reproduce, expected behavior, or supporting details"></textarea>
                </label>
                <p class="form-feedback" id="supportFormFeedback" role="status" aria-live="polite"></p>
                <div class="action-row">
                  <button class="button primary" type="submit" id="submitSupportButton">Submit Ticket</button>
                </div>
              </form>
            </section>

            <section class="panel wide">
              <div class="panel-heading">
                <h2>Bug Report / Support Queue</h2>
                <span>S6 / server / mod staff</span>
              </div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Title</th>
                      <th>Category</th>
                      <th>Severity</th>
                      <th>Status</th>
                      <th>Assigned</th>
                    </tr>
                  </thead>
                  <tbody id="supportRows"></tbody>
                </table>
              </div>
            </section>

            <section class="panel">
              <div class="panel-heading">
                <h2>Report Form Fields</h2>
                <span>Member support</span>
              </div>
              <div class="tag-cloud">
                <span>Title</span><span>Summary</span><span>Description</span><span>Expected Behavior</span>
                <span>Affected Users</span><span>Severity</span><span>Steps to Reproduce</span><span>RPT Log</span><span>Screenshots</span>
              </div>
            </section>
          </div>
        </section>
