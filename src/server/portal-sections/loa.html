<section class="view active" data-view-panel="loa">
  <div class="workspace-shell">
    <div class="workspace-commandbar" aria-label="LOA controls">
      <div class="commandbar-title">
        <strong>LOA Queue</strong>
        <span>S1 / delegated leadership workflow</span>
      </div>
    </div>

    <div class="workspace-body">
      <section class="workspace-grid" aria-label="LOA request queue">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Member</th>
                <th>Unit</th>
                <th>Dates</th>
                <th>Reason</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="loaQueue">
              <tr><td colspan="5">Loading LOA records...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <aside class="workspace-inspector" aria-label="LOA request inspector">
        <div class="inspector-header">
          <h2>Selected LOA</h2>
          <span id="loaDetailStatus">No selection</span>
        </div>
        <div id="loaDetail" class="detail-panel"></div>

        <div class="inspector-divider"></div>
        <div class="inspector-header compact">
          <h2>Submit LOA</h2>
          <span>Member workflow</span>
        </div>
        <form class="stack-form" id="loaForm">
          <div class="field-matrix">
            <label>Start Date <input id="loaStartDate" name="startDate" type="date" /></label>
            <label>End Date <input id="loaEndDate" name="endDate" type="date" /></label>
          </div>
          <label>Reason Category
            <select id="loaReasonCategory" name="reasonCategory">
              <option>Work</option><option>School</option><option>Family</option><option>Health / Personal</option><option>Military / Real-World Duty</option><option>Technical Issue</option><option>Temporary Burnout</option><option>Other</option>
            </select>
          </label>
          <label>Details <textarea id="loaDetails" name="details" rows="4" placeholder="Do not over-collect private details."></textarea></label>
          <p class="form-feedback" id="loaFormFeedback" role="status" aria-live="polite"></p>
          <div class="action-row">
            <button class="button primary" type="submit" id="submitLoaButton">Submit LOA</button>
          </div>
        </form>
      </aside>
    </div>

    <div class="workspace-statusbar">
      <span>Requests remain scoped by personnel permissions.</span>
      <span>Approval, denial, edits, and deletion are audited.</span>
    </div>
  </div>
</section>
